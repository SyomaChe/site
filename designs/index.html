<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<style>
    body {
        /* background: #264582; */
        color: #ffffff;
        font-family: "Charter";
        font-size: 1.25rem;
        line-height: 1.5;
        margin: 0;
        padding: 2rem;
    }

    code {
        font-family: monospace;
    }

    .split-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 75vh;
        margin: 0;
    }

    .left-side {
        background-color: #f0f0f0;
    }

    .right-side {
        background-color: #e0e0e0;
    }

    h2 {
        text-align: center;
    }

    ul {
        list-style-type: none;
    }
</style>

<body>
    <div class="split-grid">
        <div class="left-side">
            <h2>Notes</h2>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
            </ul>
        </div>
        <div class="right-side">
            <h2>Posts</h2>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
            </ul>
        </div>
    </div>
</body>

</html>
