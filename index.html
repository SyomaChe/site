<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<style>
  body {
    background: #264582;
    color: #ffffff;
    font-family: 'Charter';
    font-size: 1.25rem;
    line-height: 1.5;
    margin: 0;
    padding: 2rem;
  }

  body>* {
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  h2,
  h3 {
    color: #ffffff;
    font-family: 'Aptos', sans-serif;

  }

  h2 {
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  h3 {
    font-size: 1.5rem;
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  p {
    margin-bottom: 1rem;
  }

  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  li {
    margin: 1rem 0;
  }

  a {
    color: #ff0000;
    text-decoration: none;
    transition: color 0.2s;
  }

  a:hover {
    color: #ff00bf;
    /* soft pink/purple on hover */
    text-decoration: underline;
    cursor: pointer;
  }

  /* pre {
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 1rem;
    overflow-x: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
  } */

  code {
    font-family: monospace;
  }
</style>

<body>
  <h2>Sams cool website :)</h2>
  <p>This is some nice text :)</p>

<ol>
  <li>Coffee</li>
  <li>Tea</li>
  <li>Milk</li>
</ol>

<a href="https://www.example.com">Visit Example Website</a>



</body>

</html>
